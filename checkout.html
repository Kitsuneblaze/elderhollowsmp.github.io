<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - ElderHollowSMP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, rgba(122,44,255,0.25), transparent 60%);
    z-index: -1;
}

header {
    padding: 60px;
    font-size: 35px;
    color: #7a2cff;
    text-shadow: 0 0 20px rgba(122,44,255,0.4);
}

.box {
    background: rgba(255,255,255,0.05);
    width: 350px;
    margin: auto;
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(122,44,255,0.3);
    backdrop-filter: blur(10px);
}

h2 {
    margin-bottom: 5px;
    color: #7a2cff;
}

input {
    width: 90%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #7a2cff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #5a1fd6;
    transform: scale(1.05);
}

#status {
    margin-top: 15px;
    color: #aaa;
    min-height: 20px;
}

a {
    display: inline-block;
    margin-top: 20px;
    color: white;
    opacity: 0.7;
    text-decoration: none;
}

a:hover {
    opacity: 1;
}
</style>
</head>

<body>

<header>💳 Checkout</header>

<div class="box">

    <h2 id="item">Item</h2>
    <p id="price">Price</p>

    <input type="text" id="username" placeholder="Minecraft Username">

    <button onclick="pay()">Confirm Purchase</button>

    <p id="status"></p>

</div>

<a href="shop.html">⬅ Back to Shop</a>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");
const price = params.get("price");

document.getElementById("item").innerText = item;
document.getElementById("price").innerText = price + " ElHollow";

function pay() {
    const username = document.getElementById("username").value;
    const status = document.getElementById("status");

    if (!username) {
        status.innerText = "❌ Enter Minecraft username";
        return;
    }

    let dots = 0;

    status.innerText = "⏳ Purchase please wait";

    const loading = setInterval(() => {
        dots = (dots + 1) % 4;
        status.innerText = "⏳ Purchase please wait" + ".".repeat(dots);
    }, 500);

    setTimeout(() => {
        clearInterval(loading);

        status.innerText = "✅ Purchase recorded! (sent to admin)";

        console.log("=== NEW ORDER ===");
        console.log("Player:", username);
        console.log("Item:", item);
        console.log("Price:", price);
    }, 3000);
}
</script>

</body>
</html>
