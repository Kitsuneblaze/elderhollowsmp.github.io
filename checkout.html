<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body{
    font-family:Arial;
    background:#050505;
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    color:#7a2cff;
}

.item{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin:10px auto;
    width:300px;
    border-radius:10px;
}

.total{
    margin-top:20px;
    font-size:22px;
    color:#7a2cff;
}

.button{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#7a2cff;
    color:white;
    text-decoration:none;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>🛒 YOUR BASKET</h1>

<div id="cart"></div>

<div class="total" id="total"></div>

<a class="button" href="shop.html">⬅ BACK TO STORE</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart");
let total = 0;

cart.forEach(item => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = item.name + " - " + item.price + " coins";
    container.appendChild(div);

    total += item.price;
});

document.getElementById("total").innerText = "Total: " + total + " Coins";
</script>

</body>
</html>
